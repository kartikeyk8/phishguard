<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>PhishGuard — Phishing Awareness Training</title>
  <link rel="stylesheet" href="/static/css/main.css">
  <style>
    body { display:flex; align-items:center; justify-content:center; min-height:100vh; }
    .auth-wrap { width:100%; max-width:430px; padding:24px; }
    .logo-area { text-align:center; margin-bottom:2rem; }
    .logo-icon {
      width:60px; height:60px; background:var(--accent); border-radius:14px;
      display:inline-flex; align-items:center; justify-content:center;
      font-size:28px; margin-bottom:14px; box-shadow:0 0 32px var(--accent-glow);
    }
    .logo-area h1 { font-size:1.9rem; margin-bottom:4px; }
    .logo-area p  { font-size:0.88rem; color:var(--text-muted); }
    .tab-bar {
      display:flex; background:var(--bg-surface); border:1px solid var(--border);
      border-radius:var(--radius-md); padding:4px; margin-bottom:1.5rem;
    }
    .tab-btn {
      flex:1; padding:9px; border:none; background:transparent;
      color:var(--text-secondary); font-family:var(--font-sans);
      font-size:0.9rem; font-weight:600; cursor:pointer;
      border-radius:var(--radius-sm); transition:all 0.15s;
    }
    .tab-btn.active { background:var(--bg-elevated); color:var(--text-primary); }
    .auth-form { display:flex; flex-direction:column; gap:1rem; }
    .auth-form[hidden] { display:none; }
    .footer-note { text-align:center; margin-top:1.2rem; font-size:0.78rem; color:var(--text-muted); }
    .phone-hint { font-size:0.75rem; color:var(--text-muted); margin-top:3px; }
  </style>
</head>
<body>
  <div class="auth-wrap fade-up">
    <div class="logo-area">
      <div class="logo-icon">🛡</div>
      <h1>PhishGuard</h1>
      <p>Adaptive Phishing Awareness Training Platform</p>
    </div>

    <div class="card">
      <div class="tab-bar">
        <button class="tab-btn active" id="tab-login"    onclick="switchTab('login')">Sign In</button>
        <button class="tab-btn"        id="tab-register" onclick="switchTab('register')">Create Account</button>
      </div>

      <div id="alert-box"></div>

      <!-- Login -->
      <form class="auth-form" id="login-form" onsubmit="handleLogin(event)">
        <div class="form-group">
          <label class="form-label">Email</label>
          <input class="form-input" type="email" id="login-email" placeholder="you@example.com" required>
        </div>
        <div class="form-group">
          <label class="form-label">Password</label>
          <input class="form-input" type="password" id="login-password" placeholder="••••••••" required>
        </div>
        <button class="btn btn-primary btn-full btn-lg" type="submit" id="login-btn">Sign In</button>
      </form>

      <!-- Register -->
      <form class="auth-form" id="register-form" hidden onsubmit="handleRegister(event)">
        <div class="form-group">
          <label class="form-label">Full Name</label>
          <input class="form-input" type="text" id="reg-name" placeholder="Jane Smith" required>
        </div>
        <div class="form-group">
          <label class="form-label">Email</label>
          <input class="form-input" type="email" id="reg-email" placeholder="you@example.com" required>
        </div>
        <div class="form-group">
          <label class="form-label">Phone Number</label>
          <input class="form-input" type="tel" id="reg-phone" placeholder="+447911123456">
          <span class="phone-hint">Include country code. Used to send real SMS phishing simulations to your phone.</span>
        </div>
        <div class="form-group">
          <label class="form-label">Password</label>
          <input class="form-input" type="password" id="reg-password" placeholder="Min 8 characters" minlength="8" required>
        </div>
        <button class="btn btn-primary btn-full btn-lg" type="submit" id="reg-btn">Create Account</button>
      </form>
    </div>

    <p class="footer-note">🔒 Passwords hashed with bcrypt &nbsp;·&nbsp; Sessions secured with JWT</p>
  </div>

  <script type="module">
    import { login, register, saveSession, getToken } from "/static/js/auth.js";

    if (getToken()) window.location.href = "/static/pages/dashboard.html";

    window.switchTab = (tab) => {
      document.getElementById("login-form").hidden    = tab !== "login";
      document.getElementById("register-form").hidden = tab !== "register";
      document.getElementById("tab-login").classList.toggle("active",    tab === "login");
      document.getElementById("tab-register").classList.toggle("active", tab === "register");
      document.getElementById("alert-box").innerHTML = "";
    };

    window.handleLogin = async (e) => {
      e.preventDefault();
      const btn = document.getElementById("login-btn");
      btn.disabled = true;
      btn.innerHTML = '<span class="spinner"></span>';
      try {
        const data = await login(
          document.getElementById("login-email").value,
          document.getElementById("login-password").value
        );
        saveSession(data);
        window.location.href = "/static/pages/dashboard.html";
      } catch (err) {
        showAlert(err.message);
        btn.disabled = false;
        btn.textContent = "Sign In";
      }
    };

    window.handleRegister = async (e) => {
      e.preventDefault();
      const btn = document.getElementById("reg-btn");
      btn.disabled = true;
      btn.innerHTML = '<span class="spinner"></span>';
      try {
        const data = await register(
          document.getElementById("reg-name").value,
          document.getElementById("reg-email").value,
          document.getElementById("reg-phone").value,
          document.getElementById("reg-password").value
        );
        saveSession(data);
        window.location.href = "/static/pages/dashboard.html";
      } catch (err) {
        showAlert(err.message);
        btn.disabled = false;
        btn.textContent = "Create Account";
      }
    };

    function showAlert(msg) {
      document.getElementById("alert-box").innerHTML =
        `<div class="alert alert-error mb-2">${msg}</div>`;
    }
  </script>
</body>
</html>
